<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merve Seni Seviyorum ❤️</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="background">
        <div class="stars"></div>
    </div>

    <div class="container">
        <div class="content">
            <div class="floating-hearts">
                <span class="heart">❤️</span>
                <span class="heart">💕</span>
                <span class="heart">💖</span>
                <span class="heart">💗</span>
                <span class="heart">💝</span>
            </div>

            <h1 class="title">Merve</h1>
            <p class="subtitle">Seni Seviyorum</p>

            <div class="message-box">
                <p class="message">
                    Hayatımın en güzel parçası olmak için teşekkürler.
                    <br><br>
                    Her gün seninle daha da mutlu oluyorum.
                    <br><br>
                    Seninle sonsuza kadar olmak istiyorum. 💕
                </p>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="showSurprise()">Sürpriz Aç</button>
                <button class="btn btn-secondary" onclick="playMusic()">Müzik Çal</button>
            </div>

            <div id="surprise" class="surprise hidden">
                <div class="surprise-content">
                    <p>Seninle her anı özel... 🌹</p>
                    <div class="rose-animation">🌹</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Seninle Sonsuza Kadar ✨</p>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
